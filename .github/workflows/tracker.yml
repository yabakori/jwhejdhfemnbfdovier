name: YouTube Livestream Tracker v2

on:
  schedule:
    - cron: "*/20 * * * *"  # Every 15 minutes
  workflow_dispatch:          # Also lets you trigger it manually from GitHub

jobs:
  check-streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tracker
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node tracker.js
      - name: Commit notified.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add notified.json
          git diff --staged --quiet || git commit -m "Update notified.json"
          git push
